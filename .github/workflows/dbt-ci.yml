name: dbt CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - 'profiles.yml'
      - '.github/workflows/dbt-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - 'profiles.yml'
      - '.github/workflows/dbt-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: .

jobs:
  lint-compile:
    name: "Lint & Compile"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.3

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        env:
          SNOWFLAKE_ACCOUNT: "dummy"
          SNOWFLAKE_USER: "dummy"
          SNOWFLAKE_PASSWORD: "dummy"
          SNOWFLAKE_ROLE: "ANALYST"
          SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
          SNOWFLAKE_DATABASE: "P8_OPENCLASSROOMS"
          SNOWFLAKE_SCHEMA: "DBT_CI"
          DBT_PROFILES_DIR: "."
        run: dbt parse --profiles-dir . --target ci

  build:
    name: "dbt Build (run + test)"
    runs-on: ubuntu-latest
    needs: lint-compile
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.3

      - name: dbt deps
        run: dbt deps

      - name: dbt run - staging
        env: &snowflake_env
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_PROFILES_DIR: "."
        run: dbt run --profiles-dir . --target ci --select staging

      - name: dbt test - staging
        env: *snowflake_env
        run: dbt test --profiles-dir . --target ci --select staging

      - name: dbt run - intermediate
        env: *snowflake_env
        run: dbt run --profiles-dir . --target ci --select intermediate

      - name: dbt build - marts
        env: *snowflake_env
        run: dbt build --profiles-dir . --target ci --select marts

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            target/run_results.json
            target/manifest.json
          retention-days: 30

  export-csv:
    name: "Export marts -> CSV"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.3

      - name: dbt deps
        run: dbt deps

      - name: Ensure export folder exists
        run: mkdir -p output/csv

      - name: Export fct_export_unifie
        shell: bash
        env: &snowflake_env_export
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_PROFILES_DIR: "."
        run: |
          dbt show --profiles-dir . --target ci \
            --quiet --select fct_export_unifie \
            --output json --limit 2000000 \
            > output/csv/fct_export_unifie.jsonl

          python - <<'PY'
          import csv
          import json
          from pathlib import Path
          import sys

          src = Path("output/csv/fct_export_unifie.jsonl")
          dst = Path("output/csv/fct_export_unifie.csv")

          def extract_rows(node, depth=0):
              if depth > 10:
                  return []
              
              if isinstance(node, list):
                  if node and all(isinstance(item, dict) for item in node):
                      rows = []
                      for item in node:
                          if isinstance(item, dict) and len(item) > 0:
                              rows.append(item)
                      if rows:
                          return rows
                  
                  for item in node:
                      rows = extract_rows(item, depth+1)
                      if rows:
                          return rows
                  return []

              if isinstance(node, dict):
                  if "show" in node and node["show"]:
                      rows = extract_rows(node["show"], depth+1)
                      if rows:
                          return rows

                  rows = node.get("rows")
                  cols = node.get("column_names") or node.get("columns")
                  if isinstance(rows, list) and isinstance(cols, list):
                      if rows and all(isinstance(r, list) for r in rows):
                          return [dict(zip(cols, r)) for r in rows]

                  data = node.get("data")
                  if isinstance(data, list) and len(data) > 0:
                      if all(isinstance(d, dict) for d in data):
                          return data

                  for key in ["results", "result", "rows", "records", "items"]:
                      if key in node:
                          rows = extract_rows(node[key], depth+1)
                          if rows:
                              return rows

                  for value in node.values():
                      if isinstance(value, (dict, list)):
                          rows = extract_rows(value, depth+1)
                          if rows:
                              return rows

              return []

          rows = []
          line_count = 0
          with src.open("r", encoding="utf-8") as fh:
              for line in fh:
                  line = line.strip()
                  if not line:
                      continue
                  line_count += 1
                  try:
                      payload = json.loads(line)
                      rows = extract_rows(payload)
                      if rows:
                          print(f"Found {len(rows)} rows in JSON line {line_count}", file=sys.stderr)
                          break
                  except json.JSONDecodeError as e:
                      print(f"JSON parse error on line {line_count}: {e}", file=sys.stderr)
                      continue

          if not rows:
              print(f"Processed {line_count} JSON lines but found no tabular data", file=sys.stderr)
              raise SystemExit("No tabular data found in dbt show JSON output")

          fieldnames = list(rows[0].keys())
          with dst.open("w", encoding="utf-8", newline="") as fh:
              writer = csv.DictWriter(fh, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)
          
          print(f"Successfully wrote {len(rows)} rows to {dst}", file=sys.stderr)
          PY

      - name: Upload CSV export
        uses: actions/upload-artifact@v4
        with:
          name: marts-csv-${{ github.run_id }}
          path: output/csv/fct_export_unifie.csv
          retention-days: 90